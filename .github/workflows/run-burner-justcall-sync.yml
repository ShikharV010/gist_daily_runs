name: Run BurnerEmail JustCall Sync Hourly 8AM-8PM EST

on:
  schedule:
    # EST = UTC-5. 8AM–8PM EST = 13:00–01:00 UTC
    - cron: '0 13-23 * * *'  # 8AM–6PM EST
    - cron: '0 0-1 * * *'    # 7PM–8PM EST
  workflow_dispatch:

concurrency:
  group: burner-email-justcall-sync
  cancel-in-progress: false

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert ipykernel pandas sqlalchemy psycopg2-binary requests python-dotenv

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute BurnerEmail_JustCallSync.ipynb \
            --output BurnerEmail_JustCallSync.output.ipynb \
            --ExecutePreprocessor.timeout=3600

      - name: Export HTML (optional)
        run: |
          jupyter nbconvert \
            --to html \
            --output BurnerEmail_JustCallSync.output.html \
            BurnerEmail_JustCallSync.output.ipynb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: burner-email-justcall-sync-output
          path: |
            BurnerEmail_JustCallSync.output.ipynb
            BurnerEmail_JustCallSync.output.html
