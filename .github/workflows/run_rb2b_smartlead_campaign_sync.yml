name: Run RB2B SmartLead Campaign Sync Every 3 Hours

on:
  schedule:
    # Every 3 hours (UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch:

concurrency:
  group: rb2b-smartlead-sync
  cancel-in-progress: false

jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert ipykernel pandas sqlalchemy psycopg2-binary requests python-dotenv

      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute RB2B_SmartLead_campaign_sync.ipynb \
            --output RB2B_SmartLead_campaign_sync.output.ipynb \
            --ExecutePreprocessor.timeout=3600

      - name: Export HTML (optional)
        run: |
          jupyter nbconvert \
            --to html \
            --output RB2B_SmartLead_campaign_sync.output.html \
            RB2B_SmartLead_campaign_sync.output.ipynb

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rb2b-smartlead-sync-output
          path: |
            RB2B_SmartLead_campaign_sync.output.ipynb
            RB2B_SmartLead_campaign_sync.output.html
