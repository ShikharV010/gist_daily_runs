name: Cold Email Platform — Refresh Reminders

on:
  schedule:
    # 12:30 UTC = 6:00 PM IST. Runs daily.
    - cron: '30 12 * * *'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Hit Vercel cron endpoint
        env:
          BASE: ${{ secrets.COLD_EMAIL_PLATFORM_URL }}
          SECRET: ${{ secrets.COLD_EMAIL_PLATFORM_CRON_SECRET }}
        run: |
          set -euo pipefail
          curl -fsSL --max-time 300 -X GET \
            -H "Authorization: Bearer ${SECRET}" \
            "${BASE}/api/cron/refresh-reminders"
