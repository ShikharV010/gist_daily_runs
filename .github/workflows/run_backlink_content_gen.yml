name: Run Backlink Content Automaton Daily 04:00 PM IST
on:
  schedule:
    # 04:00 PM IST (UTC+5:30) == 10:30 UTC
    - cron: '30 10 * * *'
  workflow_dispatch:
concurrency:
  group: backlink-content-automaton
  cancel-in-progress: false
jobs:
  run-notebook:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install jupyter nbconvert ipykernel pandas anthropic google-auth \
                      google-auth-oauthlib google-api-python-client gspread
      - name: Execute notebook
        run: |
          jupyter nbconvert \
            --to notebook \
            --execute BacklinkContentAutomaton.ipynb \
            --output BacklinkContentAutomaton.output.ipynb \
            --ExecutePreprocessor.timeout=7200
      - name: Export HTML (optional)
        run: |
          jupyter nbconvert \
            --to html \
            --output BacklinkContentAutomaton.output.html \
            BacklinkContentAutomaton.output.ipynb
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backlink-content-automaton-output
          path: |
            BacklinkContentAutomaton.output.ipynb
            BacklinkContentAutomaton.output.html
